{% for item in counselors.items %}
<div class="flex justify-between items-center p-4">
    <div class="flex-col relative overflow-hidden m-1 p-4 h-100 min-w-xs flex-1 mx-auto outline outline-2 outline-offset-0 outline-olive-300 rounded-xl">

        <div class="sm:flex sm:justify-start justify-around mx-auto w-full">   
            <img src="../assets/images/bg/tetons.webp" class="rounded-full sm:rounded-xl size-42 object-cover"/>
            <div>
                {% if item.scheduling == "y" %}
                    {% button "Schedule" %}
                {% endif %}
            </div>    
        </div>
        <div class="border border-b-1 my-4 border-slate-200"></div>

        <div class="">
            <h2>{{ item.first }} {{ item.last }}</h2>
        </br>
            <p>{{ item.bio }}</p>
            {% if item.second %}
            <a>{{ item.second }}</a>
            {% endif %}
        </div>
    </div>
</div>
{% endfor %}
