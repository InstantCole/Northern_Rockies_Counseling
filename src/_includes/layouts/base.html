<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="robots" content="noindex, nofollow">
		<title>{{ title }}</title>
		<link rel="stylesheet" href="assets/css/main.css">
		<!-- Alpine.js Core -->
		<script src="/assets/js/alpine.js" defer></script>

		<!-- Prevents a brief flash of hidden elements before Alpine loads -->
		<style>
			[x-cloak] { display: none !important; }
		</style>
	</head>
	<body id="site-body" class="m-0 font-sans antialiased">
		{% include "partials/site-head.html" %}
		<main tabindex="-1" id="main-content" class="relative bg-white py-0 px-0 md:px-12 mx-auto flex flex-col max-w-7xl">
				{% block content %}{% endblock %}
				{% include "partials/footer.html" %}
		</main>
		
	</body>
</html>
